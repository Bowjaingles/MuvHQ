<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <style>
        body { background:#121212; color:white; font-family:sans-serif; text-align:center; padding-top:100px; }
        input, button { padding:10px; margin:5px; width:250px; }
    </style>
</head>
<body>
    <form method="POST">
        <h2>Login</h2>
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    <p><a href="{{ url_for('login_plugin.signup') }}">Create new account</a></p>
</body>
</html>
